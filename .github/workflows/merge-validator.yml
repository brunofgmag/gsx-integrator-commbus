name: Merge Validator

on:
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - '.github/**'
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-validator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-validation:
    name: Build WASM + package (with SDK)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       !startsWith(github.event.pull_request.head.ref, 'release-please--'))
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Provision MSFS 2024 SDK
        shell: pwsh
        env:
          MSFS_SDK_URL: ${{ secrets.MSFS_SDK_URL }}
          MSFS_SDK_SHA256: ${{ secrets.MSFS_SDK_SHA256 }}
        run: |
          if ($env:MSFS_SDK_SHA256) {
            ./tools/setup-msfs-sdk.ps1 -Url $env:MSFS_SDK_URL -Sha256 $env:MSFS_SDK_SHA256
          } else {
            ./tools/setup-msfs-sdk.ps1 -Url $env:MSFS_SDK_URL
          }

      - name: Build WASM + package (Release)
        shell: pwsh
        run: ./build.ps1 -Config Release
